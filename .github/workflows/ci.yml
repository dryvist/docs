name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docs.json syntax
        run: jq empty docs.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mintlify CLI
        run: npm install --global mint

      - name: Check for broken internal links
        run: mint broken-links

      - uses: oven-sh/setup-bun@v2

      - name: Install Chromium (Puppeteer runtime for Mermaid)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq chromium-browser

      - name: Install Mermaid CLI
        run: bun install --global @mermaid-js/mermaid-cli@latest

      - name: Validate Mermaid diagrams in MDX files
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: ./scripts/validate-mermaid.sh
