name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate docs.json syntax
        run: jq empty docs.json

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '20'

      - name: Install Mintlify CLI
        run: npm install --global mint

      - name: Check for broken internal links
        run: mint broken-links

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        id: setup-chrome

      - name: Install Mermaid CLI
        run: bun install --global @mermaid-js/mermaid-cli@latest

      - name: Validate Mermaid diagrams in MDX files
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: ./scripts/validate-mermaid.sh
