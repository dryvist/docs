# Secret-scan gate for the public docs site.
#
# Blocks any sensitive value from reaching docs.jacobpevans.com. Runs the full
# private org ruleset when the GITLEAKS_PRIVATE_CONFIG secret is available
# (same-repo PRs incl. drafts, and push to main), falling back to the committed
# generic .gitleaks.toml for fork PRs. Fail-closed. See scripts/secret-scan.sh
# and security/scrubbed-values.mdx.
#
# Make this a required check via branch protection on `main` after merge.
name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (redacted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets and sensitive values
        env:
          GITLEAKS_PRIVATE_CONFIG: ${{ secrets.GITLEAKS_PRIVATE_CONFIG }}
        run: ./scripts/secret-scan.sh
