# Secret-scan gate for the public docs site.
#
# Blocks any sensitive value from reaching docs.jacobpevans.com. Runs the full
# private org ruleset injected from the GITLEAKS_PRIVATE_CONFIG secret (same-repo
# PRs incl. drafts, and push to main); fork PRs that cannot read the secret fall
# back to the committed generic .gitleaks.toml.example. Fail-closed: any finding
# fails the job. See security/scrubbed-values.mdx.
#
# gitleaks runs from its official OSS Docker image — the gitleaks GitHub Action
# requires a paid license for organization accounts; the image does not.
#
# Make this a required check via branch protection on `main` after merge.
name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (redacted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select ruleset (private secret, else committed example)
        env:
          GITLEAKS_PRIVATE_CONFIG: ${{ secrets.GITLEAKS_PRIVATE_CONFIG }}
        run: printf '%s' "${GITLEAKS_PRIVATE_CONFIG:-$(cat .gitleaks.toml.example)}" > "$RUNNER_TEMP/gitleaks.toml"

      - name: Scan for secrets and sensitive values
        run: >
          docker run --rm
          -v "$PWD:/repo:ro"
          -v "$RUNNER_TEMP/gitleaks.toml:/cfg.toml:ro"
          ghcr.io/gitleaks/gitleaks:v8.30.1
          detect --source /repo --no-git --config /cfg.toml --no-banner --redact
