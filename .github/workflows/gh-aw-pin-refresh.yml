on:
  schedule:
    - cron: "0 12 * * 1"  # Monday 12:00 UTC
    - cron: "0 12 * * 4"  # Thursday 12:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: gh-aw-pin-refresh
  cancel-in-progress: false

jobs:
  refresh:
    permissions:
      contents: write
      pull-requests: write
    uses: JacobPEvans-personal/.github/.github/workflows/_gh-aw-pin-refresh.yml@main
    secrets:
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
