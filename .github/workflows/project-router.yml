name: Project Router

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: read

concurrency:
  group: >-
    project-router-${{ github.repository }}-${{
    github.event.issue.number || github.event.pull_request.number }}

jobs:
  route:
    uses: dryvist/ai-workflows/.github/workflows/project-router.yml@main
    secrets: inherit
