name: Project Router

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, ready_for_review]

# The router authenticates via an app installation token minted inside the
# called workflow (the org private key is forwarded explicitly below), so
# the GITHUB_TOKEN needs nothing beyond contents: read.
permissions:
  contents: read

# Concurrency lives HERE, not in the called workflow — a callee-level group
# identical to this one deadlocks every run (dryvist/docs#58).
concurrency:
  group: >-
    project-router-${{ github.repository }}-${{
    github.event.issue.number || github.event.pull_request.number }}

jobs:
  route:
    uses: dryvist/.github/.github/workflows/_project-router.yml@main
    secrets:
      GH_APP_CLAUDE_BOT_PRIVATE_KEY: ${{ secrets.GH_APP_CLAUDE_BOT_PRIVATE_KEY }}
