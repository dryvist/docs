name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  contents: read
  id-token: write
  issues: write

concurrency:
  group: issue-triage-${{ github.repository }}-${{ github.event.issue.number }}

jobs:
  run:
    uses: JacobPEvans/ai-workflows/.github/workflows/issue-triage.yml@main
    secrets: inherit
